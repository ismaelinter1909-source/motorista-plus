<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro - Motorista Plus</title>

 <link rel="stylesheet" href="css/cadastro.css">
 <link rel="stylesheet" href="css/global.css">
 
</head>
<body>

<header class="hero">

  <h1 class="brand">Motorista<span class="plus">Plus</span></h1>
  <p class="slogan">SEMPRE EM MOVIMENTO</p>

  <div class="card">

    <h2>Criar Conta</h2>

    <label>Nome</label>
    <input id="nome">

    <label>Telefone</label>
    <input id="telefone">

    <label>Email</label>
    <input id="email">

    <label>Senha</label>
    <input type="password" id="senha">

    <label>Placa Cavalo</label>
    <input id="placaCavalo">

    <label>Placa Reboque</label>
    <input id="placaReboque">

    <button id="btnCadastrar">Cadastrar</button>

    <a href="login.html">Já tem conta? Fazer login</a>
  </div>

</header>

<footer>© 2025 Motorista Plus - Versão 2.0</footer>
