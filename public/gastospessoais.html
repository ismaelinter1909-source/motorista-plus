<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gastos & Vales — Motorista Plus</title>

  <!-- libs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/gastospessoais.css">
</head>
 
  

<body>


  <header>
    <h1>Gastos Pessoais — Motorista <span class="plus">Plus</span></h1>
  </header>

 <main>

    <!-- Dados do motorista -->
    <section class="card">

        <h2>👤 Dados do Motorista</h2>

        <div id="dadosUsuarioCard" class="driver-grid">

            Carregando...

        </div>

    </section>

    <!-- Controle -->
    <section class="card">

        <h2>💰 Gastos Pessoais </h2>

        <div class="actions">

            <button
                id="btnNovoGasto"
                class="btn">

                ➕ Registrar Gasto Pessoal

            </button>

        </div>

        <p class="note">

            Registre todas as despesas pessoais realizadas durante a viagem.

        </p>

    </section>

    <!-- Histórico Gastos -->

    <section class="card">

        <h2>📋 Histórico de Gastos Pessoais</h2>

        <button
            id="btnHistoricoGastos"
            class="btn btn-full">

            📋 Mostrar Histórico

        </button>

        <ul
            id="listaGastos"
            style="display:none;margin-top:15px">

        </ul>

    </section>
        <section class="card">

    <h2>📄 Relatórios</h2>

    <button
        id="btnGerarPdfGastos"
        class="btn btn-full">

        📄 Gerar Relatório PDF

    </button>

</section>

</main>
<div id="modalGasto" class="modal-overlay" style="display:none;">

    <div class="modal-card">

        <h2 id="tituloModalGasto">
            💰 Novo Gasto
        </h2>

        <div class="grid2">

            <div>
                <label>Data</label>
                <input type="date" id="gastoDate">
            </div>

            <div>
                <label>Valor (R$)</label>
                <input type="number" step="0.01" id="gastoValor">
            </div>

            <div>
              <label>Categoria</label>

              <select id="gastoCategoria">

                  <option>🍔 Alimentação</option>
                  <option>☕ Café</option>
                  <option>🥤 Bebidas</option>
                  <option>🛏️ Hospedagem</option>
                  <option>🚿 Banho</option>
                  <option>🧺 Lavanderia</option>
                  <option>💊 Farmácia</option>
                  <option>🛒 Mercado</option>
                  <option>💰 Gorjeta</option>
                  <option>🎁 Lazer</option>
                  <option>📱 Internet</option>
                  <option>📦 Outros</option>

              </select>
          </div>

            <div>
                <label> Estabelecimento / Local</label>
                <input type="text" id="gastoLocal">
            </div>
            <div style="grid-column:1/3">

            <label>Descrição</label>

            <input
                type="text"
                id="gastoDescricao"
                placeholder="Ex.: Almoço durante a viagem">

        </div>

        </div>

        <div class="actions">

            <button
                id="cancelarGasto"
                class="btn btn-red">

                Cancelar

            </button>

            <button
                id="salvarGasto"
                class="btn">

                Salvar

            </button>

        </div>

    </div>

</div>

  <footer>© 2025 Motorista Plus - Versão 2.0</footer>

 <script type="module" src="js/gastospessoais.js"></script>
</body>

</html>
