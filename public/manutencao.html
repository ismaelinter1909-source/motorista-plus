<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manutenção — Motorista Plus</title>

  <!-- jsPDF + autoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="css/manutencao.css">
  <link rel="stylesheet" href="css/global.css">
 
</head>

<body>



<header>
  <h1>Manutenção — Motorista<span class="plus">Plus</span></h1>
</header>

<main>

  <!-- Perfil -->
  <section class="card">
    <h2>Dados do Motorista</h2>
    <div id="dadosUsuarioCard">Carregando...</div>
  </section>


  <!-- Registrar manutenção -->
  <section class="card">

    <h2>🔧 Controle de Manutenções</h2>

    <div class="actions">

        <button
            id="btnNovaManutencao"
            class="btn">

            ➕ Registrar Manutenção

        </button>

    </div>

    <p class="note">

        Registre qualquer manutenção realizada no cavalo ou no reboque.

    </p>

</section>

  <!-- Lista -->
  <section class="card">

    <h2>📋 Histórico de Manutenções</h2>

    <button
        id="btnHistorico"
        class="btn btn-full">

        📋 Mostrar Histórico

    </button>

    <ul
        id="lista"
        style="display:none;margin-top:15px">

    </ul>

</section>

</main>
<div id="modalManutencao" class="modal-overlay" style="display:none;">

    <div class="modal-card">

        <h2 id="tituloModal">

            🔧 Nova Manutenção

        </h2>

        <div class="grid2">

            <div>

                <label>Data</label>

                <input
                    type="date"
                    id="dataManutencao">

            </div>

            <div>

                <label>Fotos</label>

                <input
                    type="file"
                    id="fotoManutencao"
                    accept="image/*"
                    multiple>

            </div>

            <div style="grid-column:1/3">

                <label>Cavalo</label>

                <textarea id="descCavalo"></textarea>

            </div>

            <div style="grid-column:1/3">

                <label>Reboque</label>

                <textarea id="descReboque"></textarea>
                
            </div>


        </div>

        <div id="previewFotos"></div>

        <div class="actions">

            <button
                id="cancelarManutencao"
                class="btn btn-red">

                Cancelar

            </button>

            <button
                id="salvarManutencao"
                class="btn">

                Salvar

            </button>

        </div>

    </div>

</div>

<footer>© 2025 Motorista Plus</footer>
<script type="module" src="js/manutencao.js"></script>

</body>
</html>
