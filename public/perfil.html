<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meu Perfil - Motorista Plus</title>

    <link rel="stylesheet" href="css/global.css">
    
    
</head>

<body>

<header class="topo">



    <h1>Meu Perfil</h1>

</header>

<main class="perfil-container">

    <!-- Conta -->

    <section class="card">

        <h2>👤 Conta</h2>

        <div class="campo">

            <label>Nome</label>

            <input
                type="text"
                id="nome">

        </div>

        <div class="campo">

            <label>E-mail</label>

            <input
                type="email"
                id="email">

        </div>

    </section>

    <!-- Dados pessoais -->

    <section class="card">

        <h2>📱 Dados Pessoais <small>(Opcional)</small></h2>

        <div class="campo">

            <label>Telefone</label>

            <input
                type="text"
                id="telefone">

        </div>

        <div class="campo">

            <label>CPF</label>

            <input
                type="text"
                id="cpf">

        </div>

        <div class="campo">

            <label>Data de nascimento</label>

            <input
                type="date"
                id="dataNascimento">

        </div>

        <div class="campo">

            <label>Cidade</label>

            <input
                type="text"
                id="cidade">

        </div>

        <div class="campo">

            <label>Estado</label>

            <select id="estado">

<option value="">Selecione</option>

<option value="AC">Acre</option>

<option value="AL">Alagoas</option>

<option value="AP">Amapá</option>

<option value="AM">Amazonas</option>

<option value="BA">Bahia</option>

<option value="CE">Ceará</option>

<option value="DF">Distrito Federal</option>

<option value="ES">Espírito Santo</option>

<option value="GO">Goiás</option>

<option value="MA">Maranhão</option>   

<option value="MG">Minas Gerais</option>

<option value="MT">Mato Grosso</option>

<option value="MS">Mato Grosso do Sul</option>

<option value="RS">Rio Grande do Sul</option>

<option value="RN">Rio Grande do Norte</option>

<option value="RJ">Rio de Janeiro</option>

<option value="SC">Santa Catarina</option>

<option value="SP">São Paulo</option>

<option value="SE">Sergipe</option>

<option value="TO">Tocantins</option>

<option value="PA">Pará</option>

<option value="PR">Paraná</option>

<option value="PB">Paraíba</option>

<option value="PE">Pernambuco</option>

<option value="PI">Piauí</option>

<option value="RO">Rondônia</option>

<option value="RR">Roraima</option>



</select>

        </div>

    </section>

    <!-- Dados profissionais -->

    <section class="card">

        <h2>🚛 Dados Profissionais <small>(Opcional)</small></h2>

        <div class="campo">

            <label>Categoria da CNH</label>

            <select id="categoriaCNH">

                <option value="">Selecione</option>

                <option>A</option>
                <option>B</option>
                <option>C</option>
                <option>D</option>
                <option>E</option>

            </select>

        </div>

        <div class="campo">

            <label>Validade da CNH</label>

            <input
                type="date"
                id="validadeCNH">

        </div>

        <div class="campo">

            <label>Toxicológico</label>

            <input
                type="date"
                id="toxicologico">

             <p id="validadeTox">-</p>


        <div class="campo">

            <label>MOPP</label>

            <input
                type="date"
                id="mopp">

        </div>

        <div class="campo">

            <label>Empresa</label>

            <input
                type="text"
                id="empresa">

        </div>
        <div class="campo">

    <label>Data da última troca de óleo</label>

    <input
        type="date"
        id="trocaOleo">

</div>

    </section>

    <button id="btnSalvarPerfil" class="btn-salvar">

        💾 Salvar Alterações

    </button>

</main>

<script type="module" src="js/perfil.js"></script>


</body>

</html>
