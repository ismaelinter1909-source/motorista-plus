<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Abastecimentos — Motorista Plus</title>

    <link rel="stylesheet" href="css/abastecimentos.css">
    <link rel="stylesheet" href="css/global.css">

</head>

<body>

<header>

    <h1>

        Abastecimentos — Motorista<span class="plus">Plus</span>

    </h1>

</header>

<main>

    <!-- ========================= -->
    <!-- DADOS DO MOTORISTA -->
    <!-- ========================= -->

    <section class="card">

        <h2>👤 Dados do Motorista</h2>

        <div
            id="dadosUsuarioCard"
            class="driver-grid">

            Carregando...

        </div>

    </section>


    <!-- ========================= -->
    <!-- CONTROLE -->
    <!-- ========================= -->

    <section class="card">

        <h2>⛽ Controle de Abastecimentos</h2>

        <button
            id="btnNovoAbastecimento"
            class="btn btn-full">

            ➕ Registrar Abastecimento

        </button>

        <p class="note">

            Cadastre todos os abastecimentos realizados durante esta viagem.

        </p>

    </section>


    <!-- ========================= -->
    <!-- HISTÓRICO -->
    <!-- ========================= -->

    <section class="card">

    <h2>📋 Histórico de Abastecimentos</h2>

    <button
        id="btnHistorico"
        class="btn btn-full">

        📋 Mostrar Histórico

    </button>

    <ul
        id="listaAbastecimentos"
        style="display:none; margin-top:15px;">

    </ul>

</section>

</main>


<!-- ===================================== -->
<!-- MODAL -->
<!-- ===================================== -->

<div
    id="modalAbastecimento"
    class="modal-overlay"
    style="display:none;">

    <div class="modal-card">

        <h2 id="tituloModalAbastecimento">

            ⛽ Novo Abastecimento

        </h2>

        <div class="info-veiculo">

            🚛
            <span id="placaCavalo"></span>

            &nbsp;&nbsp;

            🚚
            <span id="placaReboque"></span>

        </div>

        <div class="grid2">

            <div>

                <label>Tipo de Combustível</label>

                <select id="tipoCombustivel">

                    <option value="Diesel">Diesel</option>
                    <option value="Arla">Arla</option>

                </select>

            </div>

            <div>

                <label>Data</label>

                <input
                    type="date"
                    id="data">

            </div>

            <div>

                <label>Quilometragem</label>

                <input
                    type="number"
                    id="km">

            </div>

            <div>

                <label>Litros</label>

                <input
                    type="number"
                    step="0.01"
                    id="litros">

            </div>

            <div>

                <label>Valor (R$)</label>

                <input
                    type="number"
                    step="0.01"
                    id="valor">

            </div>

            <div>

                <label>Forma de Pagamento</label>

                <select id="pagamento">

                    <option value="Nota Assinada">
                        Nota Assinada
                    </option>

                    <option value="Base-Porto">
                        Base-Porto
                    </option>

                    <option value="Pix">
                        Pix
                    </option>

                    <option value="Dinheiro">
                        Dinheiro
                    </option>

                    <option value="Cheque">
                        Cheque
                    </option>

                    <option value="Carta Frete">
                        Carta Frete
                    </option>

                </select>

            </div>

        </div>

        <div class="actions">

            <button
                id="cancelarAbastecimento"
                class="btn btn-red">

                Cancelar

            </button>

            <button
                id="salvarAbastecimento"
                class="btn btn-green">

                Salvar Abastecimento

            </button>

        </div>

    </div>

</div>

<footer>© 2025 Motorista Plus - Versão 2.0</footer>

<script type="module" src="js/abastecimentos.js"></script>

</body>

</html>
