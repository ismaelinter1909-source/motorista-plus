<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Motorista — Motorista Plus</title>
   <link rel="stylesheet" href="css/painel.css">
  

</head>

<body>

  <button id="abrirMenu">Perfil</button>

 <div class="menu-lateral" id="menuLateral">

    <div class="perfil-menu">

        <div id="avatarCircleMenu" class="avatar-circle">MP</div>

        <img id="userFotoMenu"
             class="avatar-img"
             style="display:none;">

        <h3 id="menuNome">Motorista</h3>

        <p id="menuEmail">email@email.com</p>

    </div>

    <hr>

    <nav class="menu-links">

        <a href="painel.html">🏠 Página Inicial</a>

        <a href="viagem.html">🚛 Viagem</a>

        <a href="abastecimentos.html">⛽ Abastecimentos</a>

        <a href="media.html">📈 Média</a>

        <a href="gastos.html">💰 Gastos</a>

        <a href="entregas.html">📦 Entregas</a>

        <a href="manutencao.html">🔧 Manutenção</a>

        <a href="ponto.html">🕒 Ponto</a>

        <hr>

        <button id="btnEditarPerfil">
            👤 Meu Perfil
        </button>

        <button id="btnConfiguracoes">
            ⚙ Configurações
        </button>

        <button id="logoutBtnMenu">
            🚪 Sair
        </button>

    </nav>

</div>
  <header class="hero">

    <h1 class="brand">Motorista<span class="plus">Plus</span></h1>
    <p class="slogan">SEMPRE EM MOVIMENTO</p>

    <div class="card-perfil">
      <div class="avatar-wrapper">
        <!-- Círculo com iniciais (fallback) -->
        <div id="avatarCircle" class="avatar-circle">MP</div>
        <!-- Foto do usuário (aparece quando tiver URL) -->
        <img id="userFoto" class="avatar-img" alt="Foto do motorista" style="display:none;">
        <!-- Input oculto para upload -->
        <input type="file" id="inputFoto" accept="image/*" style="display:none;">
        <small class="avatar-hint">Toque na foto para alterar</small>
      </div>

      <h2 id="boasVindas" style="text-align:center;">Bem-vindo(a)</h2>

      <div class="info" id="userNome"></div>
      <div class="info" id="userTelefone"></div>
      <div class="info" id="userPlacaCavalo"></div>
      <div class="info" id="userPlacaReboque"></div>
      <div class="info" id="userEmail"></div>
    </div>
  </header>

  
  <script type="module" src="js/painel.js"></script>
  

</body>

</html>
