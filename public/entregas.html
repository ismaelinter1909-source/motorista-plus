<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entregas — Motorista Plus</title>

  <!-- libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

 <link rel="stylesheet" href="css/entregas.css">
 <link rel="stylesheet" href="css/global.css">
</head>

<body>

  

  <header>
    <h1>Entregas — Motorista<span class="plus">Plus</span></h1>
  </header>

  <main>

    <section class="card">
      <h2>Dados do Motorista</h2>
      <div id="dadosUsuarioCard">Carregando...</div>
    </section>

   <section class="card">

    <h2>📦 Entregas</h2>

    <div class="actions">

        <button
            id="btnNovaEntrega"
            class="btn">

            ➕ Nova Entrega

        </button>

    </div>

    <p class="note">
        Clique em "Nova Entrega" para registrar uma nova carga.
    </p>

</section>

    

    <section class="card">
      <h2>Entregas Registradas</h2>
      <ul id="listaEntregas"></ul>
    </section>

  </main>
  <div id="modalEntrega" class="modal-overlay" style="display:none;">

    <div class="modal-card">

        <h2>📦 Nova Entrega</h2>

        <div class="grid2">

            <div>
                <label>Data</label>
                <input type="date" id="deliveryDate">
            </div>

            <div>
                <label>Cliente</label>
                <input type="text" id="clientName">
            </div>

            <div>
                <label>Origem</label>
                <input type="text" id="origin">
            </div>

            <div>
                <label>Destino</label>
                <input type="text" id="destination">
            </div>

            <div>
                <label>KM Inicial</label>
                <input type="number" id="initialKm">
            </div>

            <div>
                <label>KM Final</label>
                <input type="number" id="finalKm">
            </div>

            <div>
                <label>Produto</label>
                <input type="text" id="product">
            </div>

            <div>
                <label>Peso (kg)</label>
                <input type="number" id="weight">
            </div>

        </div>

        <div class="actions">

            <button
                id="cancelarEntrega"
                class="btn btn-red">

                Cancelar

            </button>

            <button
                id="salvarEntrega"
                class="btn">

                Salvar

            </button>

        </div>

    </div>

</div>

  <footer>© 2025 Motorista Plus</footer>


  <script type="module" src="js/entregas.js"></script>

</body>

</html>
