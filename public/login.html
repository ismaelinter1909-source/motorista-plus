<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Motorista Plus</title>

  <link rel="stylesheet" href="css/login.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/png" href="/img/logo-192x192.png">
  <link rel="apple-touch-icon" href="/img/logo-192x192.png">
 
</head>
<body>

<header class="hero">

  <h1 class="brand">Motorista<span class="plus">Plus</span></h1>
  <p class="slogan">SEMPRE EM MOVIMENTO</p>

  <div class="card">

    <h2>Entrar</h2>

    <label>Email</label>
    <input type="email" id="email" placeholder="seuemail@exemplo.com">

    <label>Senha</label>
    <input type="password" id="senha" placeholder="Digite sua senha">

    <button id="btnLogin">Login</button>

    <p class="reset" id="resetSenha">Esqueci minha senha</p>

    <a href="cadastro.html">Criar uma conta</a>
  </div>

</header>

<footer>© 2025 Motorista Plus - Versão 2.0</footer>

<script type="module" src="js/login.js"></script>
<script type="module" src="pwa.js"></script>

</body>
</html>
